<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{presentation/fragments :: head}"></head>
<body>
<header th:replace="~{presentation/fragments :: header}"></header>
<nav th:replace="~{presentation/fragments :: nav}"></nav>

<main>
    <!-- Panel Login (solo si no hay usuario logueado) -->
    <div class="login-panel" sec:authorize="isAnonymous()">
        <img src="/images/login.png" style="width:100%; margin-bottom:10px;"/>
        <h4>INGRESO PARA USUARIOS REGISTRADOS</h4>
        <form action="/login" method="post">
            <label style="font-size:12px">Id</label>
            <input type="text" name="username" placeholder="Id del usuario"/>
            <label style="font-size:12px">Clave</label>
            <input type="password" name="password" placeholder="Clave del usuario"/>
            <input type="submit" value="Ingresar"/>
        </form>
        <div th:if="${param.error}" class="error">
            <p>Credenciales incorrectas</p>
        </div>
    </div>

    <!-- Contenido principal -->
    <div class="content">
        <h2>INICIO</h2>

        <div class="mision-vision">
            <p style="color:#003366; font-weight:bold;">
                <!-- ADAPTAR: mensaje de bienvenida -->
                Bienvenidos al Sistema de [NOMBRE DEL SISTEMA]
            </p>
            <br/>
            <h3>Nuestra Misión:</h3>
            <p>
                <!-- ADAPTAR: texto de misión -->
                "[Texto de la misión de la organización]"
            </p>
            <br/>
            <h3>Nuestra Visión:</h3>
            <p>
                <!-- ADAPTAR: texto de visión -->
                "[Texto de la visión de la organización]"
            </p>
        </div>

        <h3 style="color:#003366; margin-bottom:10px;">Notificaciones</h3>

        <!-- ADAPTAR: agregar o quitar notificaciones según el examen -->
        <div class="notificacion">
            <img src="/images/info.gif"/>
            <p><!-- ADAPTAR: texto de notificación 1 --></p>
        </div>
        <div class="notificacion">
            <img src="/images/info.gif"/>
            <p><!-- ADAPTAR: texto de notificación 2 --></p>
        </div>
        <div class="notificacion">
            <img src="/images/info.gif"/>
            <p><!-- ADAPTAR: texto de notificación 3 --></p>
        </div>

    </div>
</main>

<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
