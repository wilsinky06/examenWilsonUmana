<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragments :: head}"></head>
<body>
<header th:replace="~{presentation/fragments :: header}"></header>
<nav th:replace="~{presentation/fragments :: nav}"></nav>

<main>
    <div class="content" style="max-width:300px; margin:30px auto;">
        <h2>LOGIN</h2>
        <form action="/login" method="post">
            <label style="font-size:12px">Usuario</label><br/>
            <input type="text" name="username" style="width:100%; margin-bottom:8px;"/><br/>
            <label style="font-size:12px">Contraseña</label><br/>
            <input type="password" name="password" style="width:100%; margin-bottom:8px;"/><br/>
            <input type="submit" value="Ingresar" style="width:100%;"/>
        </form>
        <div th:if="${param.error}" class="error" style="margin-top:10px;">
            <p>Credenciales incorrectas</p>
        </div>
    </div>
</main>

<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
