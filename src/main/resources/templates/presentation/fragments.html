<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

<head th:fragment="head">
    <meta charset="UTF-8">
    <title>Plan Paciente</title>
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="icon" href="/images/favicon.ico"/>
</head>

<header th:fragment="header">
    <div style="text-align:center; padding: 10px; background-color: white;">
        <img src="/images/header.jpg" style="width:300px; display:block; margin: 0 auto;"/>
    </div>
</header>

<nav th:fragment="nav">
    <div class="nav-bar">
        <th:block sec:authorize="isAuthenticated()">
            <span sec:authentication="name"></span>
            <a href="/logout">LOGOUT</a>
        </th:block>
    </div>
</nav>

<footer th:fragment="footer">
    <div class="footer">
        Todos los derechos reservados . 2026 . TotalSoft Inc. info@tsinc.com
    </div>
</footer>
</html>
